---
# DictionaryMark Dictionary Subsystem Requirements

sections:
  - title: Dictionary Subsystem Requirements
    requirements:
      - id: DictionaryMark-Dictionary-YamlLoading
        title: The Dictionary subsystem shall load dictionary entries from YAML files.
        justification: |
          YAML loading is the foundational step of the dictionary pipeline; all subsequent
          processing depends on correctly parsed term-definition pairs.
        tests:
          - DictionarySubsystem_BulletGeneration_ValidYaml_GeneratesBulletMarkdown
          - DictionarySubsystem_TableGeneration_ValidYaml_GeneratesTableMarkdown

      - id: DictionaryMark-Dictionary-ConflictDetection
        title: The Dictionary subsystem shall detect and report conflicting definitions across input files.
        justification: |
          Conflict detection prevents incorrect documentation from being generated when the
          same term has different definitions in different source files.
        tests:
          - DictionarySubsystem_ConflictDetection_ConflictingEntries_ReturnsConflicts

      - id: DictionaryMark-Dictionary-MarkdownFormatting
        title: The Dictionary subsystem shall format dictionary entries as Markdown output.
        justification: |
          Markdown formatting is the final output stage of the dictionary pipeline, converting
          loaded and validated entries into the output format requested by the user.
        tests:
          - DictionarySubsystem_BulletGeneration_ValidYaml_GeneratesBulletMarkdown
          - DictionarySubsystem_TableGeneration_ValidYaml_GeneratesTableMarkdown
