---
# DictionaryMark Validation unit requirements

sections:
  - title: DictionaryMark Requirements
    sections:
      - title: SelfTest Requirements
        sections:
          - title: Validation Requirements
            requirements:
              - id: DictionaryMark-Validation-Run
                title: The Validation unit shall execute self-validation tests and report results.
                justification: |
                  Self-validation demonstrates the tool is functioning correctly in its
                  deployment environment, satisfying tool qualification requirements.
                tests:
                  - Validation_Run_WithSilentContext_PrintsSummary
                  - Validation_Run_WithSilentContext_ExitCodeIsZero
                  - Validation_Run_NullContext_ThrowsArgumentNullException

              - id: DictionaryMark-Validation-VersionDisplay
                title: >-
                  The Validation unit shall confirm that version display is functioning correctly
                  in the deployment environment.
                justification: |
                  Confirms the --version output path is functioning correctly in the
                  deployment environment.
                tests:
                  - Validation_Run_WithSilentContext_VersionDisplayTestPasses

              - id: DictionaryMark-Validation-HelpDisplay
                title: >-
                  The Validation unit shall confirm that help display is functioning correctly
                  in the deployment environment.
                justification: |
                  Confirms the --help output path is functioning correctly in the
                  deployment environment.
                tests:
                  - Validation_Run_WithSilentContext_HelpDisplayTestPasses

              - id: DictionaryMark-Validation-BulletGeneration
                title: >-
                  The Validation unit shall confirm that bullet-list generation from YAML input is
                  functioning correctly in the deployment environment.
                justification: |
                  Confirms the core bullet-list output path is functioning correctly in the
                  deployment environment.
                tests:
                  - Validation_Run_WithSilentContext_BulletGenerationTestPasses

              - id: DictionaryMark-Validation-TableGeneration
                title: >-
                  The Validation unit shall confirm that Markdown table generation from YAML input is
                  functioning correctly in the deployment environment.
                justification: |
                  Confirms the core table output path is functioning correctly in the
                  deployment environment.
                tests:
                  - Validation_Run_WithSilentContext_TableGenerationTestPasses

              - id: DictionaryMark-Validation-CustomHeaders
                title: >-
                  The Validation unit shall confirm that custom column headers in table output are
                  applied correctly in the deployment environment.
                justification: |
                  Confirms that the --term-header and --def-header options are applied correctly.
                tests:
                  - Validation_Run_WithSilentContext_CustomHeadersTestPasses

              - id: DictionaryMark-Validation-ConflictDetection
                title: >-
                  The Validation unit shall confirm that cross-file conflict detection is functioning
                  correctly in the deployment environment.
                justification: |
                  Confirms that cross-file conflict detection is functioning correctly in the
                  deployment environment.
                tests:
                  - Validation_Run_WithSilentContext_ConflictDetectionTestPasses

              - id: DictionaryMark-Validation-TrxOutput
                title: The Validation unit shall write TRX-format results when a .trx results file is specified.
                justification: |
                  TRX format is widely used in MSTest-compatible toolchains and CI pipelines.
                tests:
                  - Validation_Run_WithTrxResultsFile_WritesTrxFile

              - id: DictionaryMark-Validation-JUnitOutput
                title: The Validation unit shall write JUnit-format results when a .xml results file is specified.
                justification: |
                  JUnit XML is the most widely supported test results interchange format,
                  enabling integration with a broad range of CI/CD and reporting tools.
                tests:
                  - Validation_Run_WithXmlResultsFile_WritesXmlFile

              - id: DictionaryMark-Validation-UnsupportedExtension
                title: The Validation unit shall report an error for unsupported results file extensions.
                justification: |
                  Clear error messages help users identify misconfiguration quickly.
                tests:
                  - Validation_Run_WithUnsupportedResultsFormat_DoesNotWriteFile
