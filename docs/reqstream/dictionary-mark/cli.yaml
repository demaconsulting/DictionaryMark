---
# DictionaryMark Cli subsystem requirements

sections:
  - title: DictionaryMark Requirements
    sections:
      - title: Cli Requirements
        requirements:
          - id: DictionaryMark-Cli-ArgumentParsing
            title: The CLI subsystem shall parse command-line arguments into structured Context properties.
            justification: |
              A dedicated argument-parsing layer ensures all tool interactions use the same
              consistent patterns for interpreting flags, values, and defaults.
            children:
              - DictionaryMark-Context-ArgumentParsing
              - DictionaryMark-Context-VersionFlag
              - DictionaryMark-Context-HelpFlag
              - DictionaryMark-Context-ValidateFlag
              - DictionaryMark-Context-ResultsFlag
              - DictionaryMark-Context-ResultsFlagMissing
              - DictionaryMark-Context-DepthFlag
            tests:
              - CliSubsystem_VersionFlow_ContextAndProgram_DisplaysVersionAndExits
              - CliSubsystem_HelpFlow_ContextAndProgram_DisplaysHelpAndExits
              - CliSubsystem_ValidateFlow_ContextAndProgram_RunsValidationAndExits
              - CliSubsystem_InvalidArgs_ContextAndProgram_RejectsUnknownArgumentsAndExitsNonZero

          - id: DictionaryMark-Cli-OutputManagement
            title: The CLI subsystem shall manage console output, log file output, and silent-mode suppression.
            justification: |
              Centralized output management in Context ensures all subsystems write to the same
              channels and that silent mode and log files are applied uniformly.
            children:
              - DictionaryMark-Context-SilentFlag
              - DictionaryMark-Context-LogFlag
            tests:
              - CliSubsystem_SilentFlow_ContextAndProgram_SuppressesOutput
              - CliSubsystem_LogFlow_ContextAndProgram_WritesLogFile

          - id: DictionaryMark-Cli-ResultsFile
            title: The CLI subsystem shall write validation results to a file when a results file path is specified.
            justification: |
              Results file output allows integration with CI pipelines and test reporting tools
              by providing TRX or JUnit XML output of self-validation test runs.
            children:
              - DictionaryMark-Context-ResultsFlag
            tests:
              - CliSubsystem_ResultsFlow_ContextAndProgram_WritesResultsFile
              - CliSubsystem_ResultAliasFlow_ContextAndProgram_WritesResultsFile

          - id: DictionaryMark-Cli-HeadingDepth
            title: The CLI subsystem shall control the heading depth of generated Markdown output via the --depth flag.
            justification: |
              Configurable heading depth allows generated sections to integrate into existing
              document hierarchies at the correct heading level.
            children:
              - DictionaryMark-Context-DepthFlag
            tests:
              - CliSubsystem_DepthFlow_ContextAndProgram_AdjustsHeadingDepth

          - id: DictionaryMark-Cli-ErrorOutput
            title: The CLI subsystem shall write error messages to stderr on failure.
            justification: |
              Directing errors to stderr follows POSIX conventions and allows calling scripts
              to distinguish diagnostic messages from normal tool output.
            children:
              - DictionaryMark-Context-InvalidArgs
            tests:
              - CliSubsystem_ErrorOutput_ContextAndProgram_WritesErrorToStderr
              - CliSubsystem_InvalidArgs_ContextAndProgram_RejectsUnknownArgumentsAndExitsNonZero
