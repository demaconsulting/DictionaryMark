---
# DictionaryMark Context Unit Requirements

sections:
  - title: Context Unit Requirements
    requirements:
      - id: DictionaryMark-Context-ArgumentParsing
        title: The Context class shall parse command-line arguments into structured properties.
        justification: |
          Provides a standardized approach to command-line argument parsing across all
          DEMA Consulting DotNet Tools.
        tests:
          - Context_Create_NoArguments_ReturnsDefaultContext
          - Context_Create_InputFlag_AddsPattern
          - Context_Create_MultipleInputFlags_AddsAllPatterns
          - Context_Create_OutputFlag_SetsOutputFile
          - Context_Create_FormatFlag_Table_SetsTableFormat
          - Context_Create_FormatFlag_Bullets_SetsBulletsFormat
          - Context_Create_SectionFlag_SetsSectionHeading
          - Context_Create_TermHeaderFlag_SetsTermHeader
          - Context_Create_DefinitionHeaderFlag_SetsDefinitionHeader
          - Context_Create_SortFlag_Alpha_SetsAlphabetical
          - Context_Create_SortFlag_File_SetsFileOrder

      - id: DictionaryMark-Context-DepthFlag
        title: The Context class shall parse the --depth flag value as the heading depth for Markdown output.
        justification: |
          Configurable heading depth is required to allow generated sections to integrate
          into existing document hierarchies at the correct heading level.
        tests:
          - Context_Create_DepthFlag_SetsHeadingDepth

      - id: DictionaryMark-Context-InvalidArgs
        title: The Context class shall reject unknown or malformed command-line arguments with a descriptive error.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct mistakes.
        tests:
          - Context_Create_UnknownArgument_ThrowsArgumentException
          - Context_Create_InputFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_OutputFlag_WithoutValue_ThrowsArgumentException
          - Context_Create_FormatFlag_InvalidValue_ThrowsArgumentException
          - Context_Create_SortFlag_InvalidValue_ThrowsArgumentException

      - id: DictionaryMark-Context-VersionFlag
        title: The Context class shall parse the --version (-v) flag and set the Version property to true.
        justification: |
          The version flag must be recognized and routed to the correct display path
          by Program.Run.
        tests:
          - Context_Create_VersionFlag_SetsVersionTrue
          - Context_Create_ShortVersionFlag_SetsVersionTrue

      - id: DictionaryMark-Context-SilentFlag
        title: The Context class shall parse the --silent flag and suppress output on both output channels.
        justification: |
          Silent mode must be applied uniformly to all output so that automated pipelines
          receive no unexpected console output from the tool.
        tests:
          - Context_Create_SilentFlag_SetsSilentTrue
          - Context_WriteLine_Silent_DoesNotWriteToConsole
          - Context_WriteError_Silent_DoesNotWriteToConsole

      - id: DictionaryMark-Context-LogFlag
        title: The Context class shall parse the --log flag and open the specified file for log output.
        justification: |
          Log files provide a persistent record of tool output for debugging and
          compliance audit trails.
        tests:
          - Context_Create_LogFlag_OpensLogFile
          - Context_WriteError_WritesToLogFile
