---
# Pandoc OTS Software Requirements
#
# Requirements for the Pandoc document conversion tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: Pandoc Requirements
        requirements:
          - id: DictionaryMark-OTS-Pandoc
            title: Pandoc shall convert Markdown documents to valid HTML.
            justification: |
              Pandoc is required to convert Markdown documentation sources to HTML for
              compliance reporting and CI publication in the DictionaryMark build pipeline.
              Without Pandoc, the design, verification, user guide, review plan, review report,
              code quality, and build notes documents cannot be rendered into their required
              HTML output format used by downstream publication and PDF generation steps.
            tags: [ots]
            tests:
              - Pandoc_BuildNotesHtml
              - Pandoc_CodeQualityHtml
              - Pandoc_ReviewPlanHtml
              - Pandoc_ReviewReportHtml
              - Pandoc_DesignHtml
              - Pandoc_VerificationHtml
              - Pandoc_UserGuideHtml
