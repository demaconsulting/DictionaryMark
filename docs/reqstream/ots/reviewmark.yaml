---
# ReviewMark OTS requirements

sections:
  - title: OTS Software Requirements
    sections:
      - title: ReviewMark Requirements
        requirements:
          - id: DictionaryMark-OTS-ReviewMark
            title: ReviewMark shall produce review documentation from the review configuration.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration and the review
              evidence store to produce a review plan and review report documenting file review
              coverage and currency. It runs in the same CI pipeline that produces the TRX test
              results, so a successful pipeline run is evidence that ReviewMark executed without error.
            tags: [ots]
            tests:
              - ReviewMark_ReviewPlanGeneration
              - ReviewMark_ReviewReportGeneration
          - id: DictionaryMark-OTS-ReviewMark-IndexScan
            title: ReviewMark shall scan PDF evidence into an index catalog.
            justification: |
              ReviewMark's index scan operation reads PDF review evidence and records it in an
              index catalog, which is the source of currency data used by enforcement and
              elaboration. A successful pipeline run that populates the index catalog proves
              this feature is functioning.
            tags: [ots]
            tests:
              - ReviewMark_IndexScan
          - id: DictionaryMark-OTS-ReviewMark-Enforce
            title: ReviewMark shall enforce review currency against the configured review-sets.
            justification: |
              ReviewMark's enforcement mode fails the build when a review-set's files have
              changed since the last recorded review evidence, making stale reviews a
              build-breaking condition. A successful enforcement run against current evidence
              proves this feature is functioning.
            tags: [ots]
            tests:
              - ReviewMark_Enforce
          - id: DictionaryMark-OTS-ReviewMark-Elaborate
            title: ReviewMark shall elaborate review-set details for agent use.
            justification: |
              ReviewMark's elaborate command resolves a review-set's context and file list from
              the configuration, providing the information formal-review agents need to scope
              their review without re-parsing the configuration file themselves.
            tags: [ots]
            tests:
              - ReviewMark_Elaborate
          - id: DictionaryMark-OTS-ReviewMark-Lint
            title: ReviewMark shall validate the .reviewmark.yaml configuration file.
            justification: |
              ReviewMark's lint mode validates the structure of .reviewmark.yaml, catching
              configuration errors before they affect enforcement or report generation.
            tags: [ots]
            tests:
              - ReviewMark_Lint
          - id: DictionaryMark-OTS-ReviewMark-WorkingDirectoryOverride
            title: ReviewMark shall support overriding the working directory for file resolution.
            justification: |
              ReviewMark's working-directory override option allows file paths in the
              configuration to be resolved relative to a directory other than the process's
              current directory, supporting invocation from CI steps with a different working
              directory.
            tags: [ots]
            tests:
              - ReviewMark_WorkingDirectoryOverride
