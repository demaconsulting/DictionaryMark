---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following hierarchical scope principles.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "README.md"                   # Root README file
  - "requirements.yaml"           # Root requirements file
  - "**/*.cs"                     # All C# source and test files
  - "docs/reqstream/**/*.yaml"    # Requirements files
  - "docs/sysml2/**/*.sysml"      # SysML2 architecture model files
  - "docs/design/**/*.md"         # Design documentation files
  - "docs/verification/**/*.md"   # Verification documentation files
  - "docs/user_guide/**/*.md"     # User guide documentation
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output
  - "!node_modules/**"            # Exclude npm dependencies
  - "!**/.venv/**"                # Exclude Python virtual environment

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/DictionaryMark/reviews/index.json

# Context included for all reviews.
context:
  - "docs/design/introduction.md"

# Review sets following hierarchical scope principles.
# Each review-set focuses on a single compliance question with manageable file counts.
reviews:
  # Purpose Review (only one per repository)
  - id: Purpose
    title: Review that README and User Guide are Coherent and Complete
    context:
      - "!docs/design/introduction.md"
    paths:
      - "README.md"
      - "docs/user_guide/**/*.md"

  # Decomposition Review (only one per repository)
  - id: Decomposition
    title: Review that DictionaryMark Decomposition Addresses the Stated Purpose
    context:
      - "README.md"
      - "docs/user_guide/**/*.md"
    paths:
      - "requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/sysml2/**/*.sysml"

  # DictionaryMark-Architecture Review (one per system)
  - id: DictionaryMark-Architecture
    title: Review that DictionaryMark Architecture Satisfies Requirements
    context:
      - "README.md"
      - "docs/user_guide/**/*.md"
    paths:
      - "docs/reqstream/dictionary-mark.yaml"
      - "docs/design/introduction.md"
      - "docs/design/dictionary-mark.md"
      - "docs/verification/introduction.md"
      - "docs/verification/dictionary-mark.md"
      - "docs/verification/dictionary-mark/test-helpers.md"
      - "test/**/IntegrationTests.cs"
      - "test/**/AssemblyInfo.cs"
      - "test/**/Helpers/*.cs"

  # DictionaryMark-Design Review (one per system)
  - id: DictionaryMark-Design
    title: Review that DictionaryMark Design is Consistent and Complete
    context:
      - "docs/reqstream/dictionary-mark.yaml"
    paths:
      - "docs/reqstream/dictionary-mark/platform-requirements.yaml"
      - "docs/design/introduction.md"
      - "docs/design/dictionary-mark.md"
      - "docs/design/dictionary-mark/**/*.md"
      - "docs/design/ots.md"

  # DictionaryMark-Verification Review (one per system)
  - id: DictionaryMark-Verification
    title: Review that DictionaryMark Verification is Consistent and Complete
    context:
      - "docs/reqstream/dictionary-mark.yaml"
    paths:
      - "docs/verification/introduction.md"
      - "docs/verification/dictionary-mark.md"
      - "docs/verification/dictionary-mark/**/*.md"
      - "docs/verification/ots.md"

  # DictionaryMark-AllRequirements Review (one per system)
  - id: DictionaryMark-AllRequirements
    title: Review that All DictionaryMark Requirements are Complete
    context:
      - "docs/design/dictionary-mark.md"
      - "docs/reqstream/dictionary-mark.yaml"
    paths:
      - "docs/reqstream/dictionary-mark/**/*.yaml"

  # DictionaryMark-Program Review (unit directly under the system)
  - id: DictionaryMark-Program
    title: Review that DictionaryMark Program Implementation is Correct
    context:
      - "docs/design/dictionary-mark.md"
      - "docs/reqstream/dictionary-mark.yaml"
    paths:
      - "docs/reqstream/dictionary-mark/program.yaml"
      - "docs/design/dictionary-mark/program.md"
      - "docs/verification/dictionary-mark/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"

  # DictionaryMark-Cli Review (subsystem)
  - id: DictionaryMark-Cli
    title: Review that DictionaryMark Cli Satisfies Subsystem Requirements
    context:
      - "docs/design/dictionary-mark.md"
      - "docs/reqstream/dictionary-mark.yaml"
    paths:
      - "docs/reqstream/dictionary-mark/cli.yaml"
      - "docs/design/dictionary-mark/cli.md"
      - "docs/verification/dictionary-mark/cli.md"
      - "test/**/Cli/CliSubsystemTests.cs"

  # DictionaryMark-Cli-Context Review (unit under a subsystem)
  - id: DictionaryMark-Cli-Context
    title: Review that DictionaryMark Cli Context Implementation is Correct
    context:
      - "docs/design/dictionary-mark.md"
