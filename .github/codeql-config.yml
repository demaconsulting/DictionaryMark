---
# CodeQL configuration for DictionaryMark
# Suppresses intentional generic catch clauses

name: "DictionaryMark CodeQL Config"

# Globally ignore build output and generated files
paths-ignore:
  - "**/obj/**"
  - "**/bin/**"

# Query filters to disable specific queries for certain paths
query-filters:
  - exclude:
      id: cs/catch-of-all-exceptions
    paths:
      - src/DemaConsulting.DictionaryMark/Cli/Context.cs
      - src/DemaConsulting.DictionaryMark/Cli/Validation.cs
  # Exclude path-combine warnings in PathHelpers (validated safe usage)
  - exclude:
      id: cs/path-combine
    paths:
      - src/DemaConsulting.DictionaryMark/Utilities/GlobMatcher.cs
